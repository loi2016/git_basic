name: Auto Create Study PR

on:
  push:
    branches:
      - "java/**"
      - "spring/**"
      - "database/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch
        run: git fetch origin main

      - name: Check for existing pull request
        id: existing-pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          PR_COUNT=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json number \
            --jq 'length')

          echo "count=$PR_COUNT" >> "$GITHUB_OUTPUT"

      - name: Generate pull request body
        if: steps.existing-pr.outputs.count == '0'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          python3 <<'PY'
          import re
          import subprocess
          from pathlib import Path

          def run_git(*args: str) -> str:
              result = subprocess.run(
                  ["git", *args],
                  check=True,
                  capture_output=True,
                  text=True,
                  encoding="utf-8",
              )
              return result.stdout

          # main과 현재 브랜치 사이에서 변경된 파일을 찾는다.
          diff_output = run_git(
              "diff",
              "--name-status",
              "origin/main...HEAD",
          )

          changed_files: list[tuple[str, str]] = []

          for line in diff_output.splitlines():
              if not line.strip():
                  continue

              parts = line.split("\t")
              status = parts[0]

              # 이름 변경은 최종 경로를 사용한다.
              if status.startswith("R") and len(parts) >= 3:
                  path = parts[2]
              elif len(parts) >= 2:
                  path = parts[1]
              else:
                  continue

              changed_files.append((status, path))

          java_files: list[tuple[str, Path]] = []
          readme_changed = False

          for status, file_path in changed_files:
              path = Path(file_path)

              if path.suffix == ".java" and path.exists():
                  java_files.append((status, path))

              if path.name.lower() == "readme.md":
                  readme_changed = True

          # Java 코드의 "// 1. 주제명" 형식 주석을 추출한다.
          heading_pattern = re.compile(
              r"^\s*//\s*\d+\.\s*(.+?)\s*$"
          )

          study_topics: list[str] = []

          for _, java_file in java_files:
              content = java_file.read_text(encoding="utf-8")

              for line in content.splitlines():
                  match = heading_pattern.match(line)

                  if not match:
                      continue

                  topic = match.group(1).strip()

                  if topic and topic not in study_topics:
                      study_topics.append(topic)

          body_lines = ["## 학습 내용"]

          if study_topics:
              body_lines.extend(
                  f"- {topic}" for topic in study_topics
              )
          else:
              body_lines.append("- 학습 내용 확인 필요")

          body_lines.extend(["", "## 변경 사항"])

          for status, java_file in java_files:
              if status == "A":
                  action = "작성"
              elif status.startswith("R"):
                  action = "이름 변경 및 수정"
              else:
                  action = "수정"

              body_lines.append(
                  f"- `{java_file.name}` {action}"
              )

          if readme_changed:
              body_lines.append("- README 체크리스트 업데이트")

          if not java_files and not readme_changed:
              body_lines.append("- 변경 내용 확인 필요")
          
          body_lines.extent(["", "## 실행 결과"])

          Path("pr-body.md").write_text(
              "\n".join(body_lines) + "\n",
              encoding="utf-8",
          )
          PY

          echo "===== Generated PR body ====="
          cat pr-body.md

      - name: Create pull request
        if: steps.existing-pr.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          PR_TITLE=$(git log -1 --pretty=%s)

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body-file pr-body.md

      - name: Skip duplicate pull request
        if: steps.existing-pr.outputs.count != '0'
        run: |
          echo "An open pull request already exists."
          echo "The new commits will be reflected in that pull request."